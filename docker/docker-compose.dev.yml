version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: educomp-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: educomp
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  adminer:
    image: adminer:latest
    container_name: educomp-adminer
    ports:
      - "8888:8888"
    restart: unless-stopped

volumes:
  postgres_data:
